name: Discover Boxing Updates
on:
  workflow_dispatch:
  schedule:
    - cron: '23 18 * * *'
permissions:
  contents: write
  pull-requests: write
jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python scripts/discover.py
      - name: Create review pull request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: 'Propose boxing calendar updates'
          title: 'Review proposed boxing calendar updates'
          body: 'Review data/proposed-events.json before merging into data/events.json.'
          branch: automated/boxing-update-review
          delete-branch: true
