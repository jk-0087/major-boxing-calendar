name: Build and Publish Calendar

on:
  push:
    branches: [main]
    paths:
      - "data/events.json"
      - "scripts/**"
      - "tests/**"
      - ".github/workflows/build-calendar.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -r requirements-dev.txt
      - run: python -m pytest -q
      - run: python scripts/generate.py
      - name: Commit generated files
        run: |
          if git diff --quiet -- major-boxing-calendar.ics index.html; then
            echo "Generated files are current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add major-boxing-calendar.ics index.html
          git commit -m "Rebuild calendar and website"
          git push
