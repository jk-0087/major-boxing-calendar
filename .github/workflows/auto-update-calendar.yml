name: Automatically Update Calendar

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

concurrency:
  group: boxing-calendar-auto-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -r requirements.txt -r requirements-dev.txt
      - name: Check official boxing sources and apply safe updates
        id: discover
        shell: bash
        run: |
          set +e
          python scripts/discover.py --apply
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          if [ "$code" -ne 0 ] && [ "$code" -ne 10 ]; then
            exit "$code"
          fi
      - run: python scripts/validate.py
      - run: python -m pytest -q
      - name: Regenerate calendar and website
        if: steps.discover.outputs.exit_code == '10'
        run: python scripts/generate.py
      - name: Commit discovery results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/proposed-events.json
          if [ "${{ steps.discover.outputs.exit_code }}" = "10" ]; then
            git add data/events.json major-boxing-calendar.ics index.html
          fi
          if git diff --cached --quiet; then
            echo "No discovery changes to commit."
            exit 0
          fi
          git commit -m "Automatically update boxing discovery results"
          git push
